<div class="admin-card fade-in-up">
  <div class="admin-card-header">
    <h3 class="admin-card-title">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
      Filtros de Búsqueda
    </h3>
  </div>
  
  <div class="admin-card-body">
    <form [formGroup]="filterForm" (ngSubmit)="aplicarFiltros()" class="filter-form">
      
      <div class="form-group">
        <label for="estado">Tipo de restricción</label>
        <select id="estado" formControlName="estado" class="form-control">
          <option value="" selected>Todos</option>
          <option value="temporal">Temporal</option>
          <option value="permanente">Permanente</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="orden">Ordenar por fecha</label>
        <select id="orden" formControlName="orden" class="form-control">
          <option value="" selected>Seleccionar...</option>
          <option value="desc">Más recientes</option>
          <option value="asc">Más antiguos</option>
        </select>
      </div>
      
      <div class="form-group search-group">
        <label for="search">Buscar paciente</label>
        <input id="search" formControlName="search" type="text" class="form-control" placeholder="Ej. Naomi o 524751052361">
      </div>
      
      <div class="form-actions">
        <button class="btn-primary w-full" type="submit">Aplicar Filtros</button>
      </div>

    </form>
  </div>
</div>
