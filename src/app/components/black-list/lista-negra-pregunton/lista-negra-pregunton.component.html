<div class="patient-card alert-card fade-in-up">
  <div class="alert-indicator"></div>

  <div class="card-body">
    <div class="card-header">
      <div class="patient-info">
        <div class="avatar-error">
          <i class="fas fa-user-slash"></i>
        </div>
        <div>
          <h3 class="patient-name">{{ entrada.pregunton.nombre }}</h3>
          <p class="patient-phone">
            <i class="fas fa-phone-alt"></i> {{ entrada.pregunton.telefonoWhatsapp }}
          </p>
        </div>
      </div>
      <span class="badge-alert">Lead Restringido</span>
    </div>

    <div class="card-details">
      <div class="detail-row">
        <span class="detail-label">Tipo:</span>
        <span class="detail-value status-badge" [class]="entrada.tipo">{{ entrada.tipo }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Motivo:</span>
        <span class="detail-value">{{ entrada.razon }}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Fecha:</span>
        <span class="detail-value">{{ formatearFecha(entrada.fechaAgregado) }}</span>
      </div>
    </div>

    <div class="expandable-section" *ngIf="entrada.detalles">
      <button class="btn-toggle" (click)="$event.stopPropagation(); toggleDetails()">
        <span>Ver más detalles</span>
        <i class="fas fa-chevron-down" [class.rotated]="showDetails"></i>
      </button>
      
      <div class="expandable-content" [class.open]="showDetails">
        <p>{{ entrada.detalles }}</p>
      </div>
    </div>
  </div>
  
  <div class="card-footer">
    <span class="hint-text">
      <i class="fas fa-calendar-alt"></i> Agregado el {{ formatearFecha(entrada.fechaAgregado) }}
    </span>
    <button class="btn-outline-danger" (click)="eliminarDeListaNegra()">
      <i class="fas fa-user-check"></i> Remover sanción
    </button>
  </div>
</div>
