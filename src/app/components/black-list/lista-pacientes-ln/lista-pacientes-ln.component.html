<div class="admin-page-container fade-in-up">
  <!-- ENCABEZADO DE LA PÁGINA -->
  <div class="page-header">
    <div class="header-content">
      <h1 class="page-title">Directorio de Restricciones</h1>
      <p class="page-subtitle">Gestión de pacientes y leads con alertas o bloqueos del servicio.</p>
    </div>
  </div>

  <div class="page-body">
    <!-- PESTAÑAS DE NAVEGACIÓN -->
    <div class="tabs-container">
      <button 
        class="tab-button"
        [class.active]="tipoSeleccionado === 'pacientes'" 
        (click)="seleccionarTipo('pacientes')">
        <i class="fas fa-user-injured"></i> Pacientes
      </button>
      <button 
        class="tab-button"
        [class.active]="tipoSeleccionado === 'preguntones'" 
        (click)="seleccionarTipo('preguntones')">
        <i class="fas fa-user-clock"></i> Leads (Prospectos)
      </button>
    </div>

    <!-- LISTA DE PACIENTES -->
    <div class="list-wrapper" *ngIf="tipoSeleccionado === 'pacientes'">
      <div *ngFor="let entrada of pacientesListaNegra" class="card-wrapper">
        <app-lista-negra [entrada]="entrada"></app-lista-negra>
      </div>
      
      <!-- Estado Vacío -->
      <div *ngIf="pacientesListaNegra.length === 0" class="empty-state">
        <div class="empty-icon"><i class="fas fa-shield-alt"></i></div>
        <h3>Todo en orden</h3>
        <p>No hay pacientes registrados en la lista de restricciones actualmente.</p>
      </div>
    </div>

    <!-- LISTA DE LEADS -->
    <div class="list-wrapper" *ngIf="tipoSeleccionado === 'preguntones'">
      <div *ngFor="let entrada of preguntonesListaNegra" class="card-wrapper">
        <!-- Aquí se inserta el componente que limpiamos en el paso anterior -->
        <app-lista-negra-pregunton [entrada]="entrada" (eliminado)="recargarPreguntones()"></app-lista-negra-pregunton>
      </div>
      
      <!-- Estado Vacío -->
      <div *ngIf="preguntonesListaNegra.length === 0" class="empty-state">
        <div class="empty-icon"><i class="fas fa-shield-alt"></i></div>
        <h3>Todo en orden</h3>
        <p>No hay leads (prospectos) con restricciones en este momento.</p>
      </div>
    </div>
  </div>
</div>
