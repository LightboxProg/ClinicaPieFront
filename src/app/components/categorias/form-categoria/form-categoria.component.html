<div class="admin-card fade-in-up">
  <div class="admin-card-header">
    <h3 class="admin-card-title">
      <i class="fas" [ngClass]="esEdicion ? 'fa-edit' : 'fa-plus-circle'"></i> 
      {{ esEdicion ? 'Editar Categoría' : 'Nueva Categoría' }}
    </h3>
  </div>

  <div class="admin-card-body">
    <form (ngSubmit)="guardarForm($event)" class="clinica-form">
      
      <div class="form-group">
        <label for="nombre">Nombre de la categoría <span class="required">*</span></label>
        <input 
          type="text" 
          id="nombre"
          [(ngModel)]="formData.nombre" 
          name="nombre" 
          class="form-control" 
          required
          placeholder="Ej. Podología Preventiva" 
        />
      </div>

      <div class="form-group">
        <label for="descripcion">Descripción (Opcional)</label>
        <textarea 
          id="descripcion"
          [(ngModel)]="formData.descripcion" 
          name="descripcion" 
          class="form-control" 
          rows="3"
          placeholder="Breve descripción de los servicios que incluye..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label for="orden">Orden de visualización <span class="required">*</span></label>
          <input 
            type="number" 
            id="orden"
            [(ngModel)]="formData.orden" 
            name="orden" 
            class="form-control" 
            required min="0" step="1" 
          />
          <small class="form-hint">Menor número = aparece primero</small>
        </div>

                            <div class="form-group half toggle-group">
          <label for="categoriaActiva">Estado de la categoría</label>
          <div class="switch-container">
            <label class="switch" for="categoriaActiva">
              <input type="checkbox" id="categoriaActiva" [(ngModel)]="formData.activa" name="activa">
              <span class="slider round"></span>
            </label>
            <span class="status-text" [class.active]="formData.activa">
              {{ formData.activa ? 'Activa' : 'Inactiva' }}
            </span>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" (click)="cancelarForm()" class="btn-secondary">
          <i class="fas fa-times"></i> Cancelar
        </button>
        <button type="submit" class="btn-primary" [disabled]="!isFormValid()">
          <i class="fas fa-save"></i> {{ esEdicion ? 'Actualizar' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>

  <div *ngIf="esEdicion" class="mode-info">
    <i class="fas fa-info-circle"></i> ID de sistema: {{ formData._id }}
  </div>
</div>
          </div>
        </div>
      </div>

      <div *ngIf="esEdicion" class="mode-info">
        <i class="fas fa-info-circle"></i> ID de sistema: {{ formData._id }}
      </div>

      <div class="form-actions">
        <button type="button" (click)="cancelarForm()" class="btn-outline">
          Cancelar
        </button>
        <button type="submit" class="btn-primary">
          <i class="fas fa-save"></i> {{ esEdicion ? 'Actualizar' : 'Guardar' }} Categoría
        </button>
      </div>

    </form>
  </div>
</div>
