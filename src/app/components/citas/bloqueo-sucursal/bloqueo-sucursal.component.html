<div class="modal-overlay" (click)="cerrar()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <header class="modal-header">
      <div class="header-text">
        <h3>🔒 Bloquear Horas en Sucursal</h3>
        <p>Selecciona el rango de horas que deseas bloquear</p>
      </div>
      <button class="btn-close" (click)="cerrar()">&times;</button>
    </header>

    <form [formGroup]="bloqueoForm" (ngSubmit)="crearBloqueo()" class="modal-body">
      <div class="grid-form">
        <!-- Sucursal (solo si no viene pre-seleccionada) -->
        <div class="campo full" *ngIf="!sucursalId">
          <label>Sucursal</label>
          <select formControlName="sucursalId" required>
            <option value="" disabled selected>-- Selecciona una sucursal --</option>
            <option *ngFor="let s of sucursales" [value]="s._id">{{ s.nombre }}</option>
          </select>
        </div>

        <div class="campo full">
          <label>Fecha</label>
          <input type="date" formControlName="fecha" required [min]="fechaMinima">
        </div>

        <div class="campo">
          <label>Hora Inicio</label>
          <input type="time" formControlName="horaInicio" required>
        </div>

        <div class="campo">
          <label>Hora Fin</label>
          <input type="time" formControlName="horaFin" required>
        </div>

        <div class="campo full">
          <label>Tipo de Bloqueo</label>
          <select formControlName="tipo">
            <option value="general">General</option>
            <option value="personal">Personal</option>
            <option value="mantenimiento">Mantenimiento</option>
            <option value="reunion">Reunión</option>
          </select>
        </div>

        <div class="campo full">
          <label>Motivo (opcional)</label>
          <input type="text" formControlName="motivo" placeholder="Ej. Mantenimiento de instalaciones">
        </div>
      </div>

      <div class="alerta-error" *ngIf="mensajeError">
        <strong>❌ Error:</strong> {{ mensajeError }}
      </div>

      <footer class="modal-footer">
        <button type="button" class="btn-cancelar" (click)="cerrar()">Cancelar</button>
        <button type="submit" class="btn-guardar" [disabled]="bloqueoForm.invalid || cargando">
          <span *ngIf="!cargando">Bloquear Horas</span>
          <span *ngIf="cargando" class="loader"></span>
        </button>
      </footer>
    </form>
  </div>
</div>
