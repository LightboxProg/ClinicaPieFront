<div class="contenedor-calendario">
  
  <header class="cabecera">
    <h2>Agenda General de Especialistas</h2>
    
    <div class="filtros-fecha">
      <div class="campo-fecha">
        <label>Desde:</label>
        <input type="date" [(ngModel)]="fechaInicio" (change)="cargarTodosLosEventos()">
      </div>
      <span class="separador">-</span>
      <div class="campo-fecha">
        <label>Hasta:</label>
        <input type="date" [(ngModel)]="fechaFin" (change)="cargarTodosLosEventos()">
      </div>
      <button (click)="cargarTodosLosEventos()" class="btn-recargar">
        Recargar
      </button>
    </div>
  </header>

  <div *ngIf="cargandoEventos" class="estado-mensaje cargando">
    <div class="spinner"></div>
    <p>Conectando con Google Calendar...</p>
  </div>

  <div *ngIf="!cargandoEventos && eventos.length === 0" class="estado-mensaje vacio">
    <p>No hay eventos programados en este rango de fechas.</p>
  </div>

  <div *ngIf="!cargandoEventos && eventos.length > 0" class="grid-eventos">
    
    <div *ngFor="let evento of eventos" class="tarjeta-evento">
      
      <div class="barra-color" [ngClass]="{'paciente': evento.colorId === '2', 'lead': evento.colorId === '5'}"></div>
      
      <div class="contenido-evento">
        <h3 class="titulo">{{ evento.summary || 'Cita Programada' }}</h3>
        
        <div class="detalles">
          <p class="fecha">
            <strong>Inicio:</strong> {{ evento.start?.dateTime | date:'medium' }}
          </p>
          <p class="fecha">
            <strong>Fin:</strong> {{ evento.end?.dateTime | date:'shortTime' }}
          </p>
        </div>

        <div class="descripcion" *ngIf="evento.description">
          <p>{{ evento.description }}</p>
        </div>

        <button class="btn-reagendar-global" (click)="abrirReagendar(evento)">
          Reagendar
        </button>

      </div>
    </div>

    <app-regendar-citas
      *ngIf="mostrarModalReagendar"
      [citaOriginal]="citaParaReagendar"
      (cerrarModal)="mostrarModalReagendar = false"
      (citaReagendada)="cargarTodosLosEventos()">
    </app-regendar-citas>
    
  </div>
</div>
