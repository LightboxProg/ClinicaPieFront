<div class="m-1 mb-4">
  <button class="btn-primary" (click)="abrirModal()">
    <i class="fas fa-user-md"></i> Nuevo Doctor
  </button>
</div>

<app-modal [isVisible]="isModalVisible" [title]="esEdicion ? 'Editar Doctor' : 'Registro de Doctores'" (close)="cerrarModal()">
  
  <div class="modal-form-container">
    <form (submit)="agregarDoctor(); $event.preventDefault()" class="clinica-form">
      
      <h4 class="form-section-title"><i class="fas fa-user-md"></i> Datos del Especialista</h4>
      
      <div class="form-group">
        <label>Nombre completo <span class="required">*</span></label>
        <div class="input-icon-wrapper">
          <input type="text" [(ngModel)]="nuevoDoctor.nombre" name="nombre" class="form-control" required placeholder="Ej. Dr. Roberto Gómez" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label>Especialidad <span class="required">*</span></label>
          <input type="text" [(ngModel)]="nuevoDoctor.especialidad" name="especialidad" class="form-control" required placeholder="Ej. Podiatra, Cirujano..." />
        </div>
        <div class="form-group half">
          <label>Edad <span class="required">*</span></label>
          <input type="number" [(ngModel)]="nuevoDoctor.edad" name="edad" class="form-control" required placeholder="Ej. 35" min="18" />
        </div>
      </div>

      <hr class="form-divider">

      <h4 class="form-section-title"><i class="fas fa-address-book"></i> Datos de Contacto</h4>

      <div class="form-row">
        <div class="form-group half">
          <label>Teléfono <span class="required">*</span></label>
          <input type="tel" [(ngModel)]="nuevoDoctor.telefono" name="telefono" class="form-control" required placeholder="10 dígitos" />
        </div>
        <div class="form-group half">
          <label>Correo electrónico <span class="required">*</span></label>
          <input type="email" [(ngModel)]="nuevoDoctor.correo" name="correo" class="form-control" required placeholder="doctor@clinicadelpie.com" />
        </div>
      </div>

      <div class="form-actions mt-4">
        <button type="button" (click)="cerrarModal()" class="btn-outline">Cancelar</button>
        <button type="submit" class="btn-primary">
          <i class="fas fa-save"></i> {{ esEdicion ? 'Actualizar Doctor' : 'Registrar Doctor' }}
        </button>
      </div>

    </form>
  </div>
</app-modal>
