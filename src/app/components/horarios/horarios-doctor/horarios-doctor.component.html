<div class="detalle-horario-container" *ngIf="datosHorario">

    <header class="cabecera-detalle">
        <div>
            <h3>Editando Horario: {{ datosHorario.doctor?.nombre }} {{ datosHorario.doctor?.apeP }}</h3>
            <p class="especialidad">{{ datosHorario.doctor?.especialidad || 'Especialista' }}</p>
        </div>

        <button class="btn-volver" (click)="volver()">
            Regresar a la lista
        </button>
    </header>

    <div class="alerta-mensaje" *ngIf="mensaje" [ngClass]="{'error': mensaje.includes('Error')}">
        {{ mensaje }}
    </div>

    <div class="grid-dias">
        <div *ngFor="let dia of diasEditables" class="tarjeta-dia" [class.inactivo]="!dia.activo">

            <div class="dia-titulo">
                <div class="toggle-container">
                    <input type="checkbox" [id]="'chk-' + dia.diaSemana" [(ngModel)]="dia.activo">
                    <label [for]="'chk-' + dia.diaSemana">
                        <h4>{{ obtenerNombreDia(dia.diaSemana) }}</h4>
                    </label>
                </div>

                <button *ngIf="dia.activo" class="btn-add-turno" (click)="agregarTurno(dia)">
                    + Turno
                </button>
            </div>

            <div class="lista-turnos" *ngIf="dia.activo">
                <p *ngIf="!dia.turnos || dia.turnos.length === 0" class="sin-turnos">Agrega un turno para este día.</p>

                <div *ngFor="let turno of dia.turnos; let i = index" class="turno-item-edit">
                    <div class="campo-hora">
                        <label>Entrada</label>
                        <input type="time" [(ngModel)]="turno.horaInicio">
                    </div>
                    <div class="campo-hora">
                        <label>Salida</label>
                        <input type="time" [(ngModel)]="turno.horaFin">
                    </div>
                    <button class="btn-delete" (click)="eliminarTurno(dia, i)">X</button>
                </div>
            </div>

        </div>
    </div>

    <footer class="pie-detalle">
        <button class="btn-guardar" (click)="guardarCambios()" [disabled]="guardando">
            <span *ngIf="!guardando">Guardar Cambios</span>
            <span *ngIf="guardando">Guardando...</span>
        </button>
    </footer>

</div>
