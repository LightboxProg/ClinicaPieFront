<div class="chat-sidebar-container">
  
  <div class="chat-search-box">
    <div class="input-icon-wrapper">
      <i class="fas fa-search input-icon"></i>
      <input type="text" 
             class="form-control pl-4" 
             placeholder="Buscar por nombre o teléfono..."
             (input)="busquedaTexto = $any($event.target).value" />
    </div>
  </div>

  <div class="chat-filters">
    <button class="filter-pill" [class.active]="filtroEstado === 'todos'" (click)="setFiltro('todos')">
      Todos
    </button>
    <button class="filter-pill" [class.active]="filtroEstado === 'verde'" (click)="setFiltro('verde')">
      <span class="dot bg-success"></span> Verde
    </button>
    <button class="filter-pill" [class.active]="filtroEstado === 'amarillo'" (click)="setFiltro('amarillo')">
      <span class="dot bg-warning"></span> Amarillo
    </button>
    <button class="filter-pill" [class.active]="filtroEstado === 'rojo'" (click)="setFiltro('rojo')">
      <span class="dot bg-danger"></span> Rojo
    </button>
  </div>

  <div class="lista-chats custom-scrollbar">
    
    <div class="chat-item" *ngFor="let chat of chatsFiltrados" (click)="clickChat(chat)">
      
      <div class="chat-avatar">
        <div class="avatar-circle">
          <i class="fas fa-user"></i>
        </div>
        <span class="estado-indicador" [ngClass]="obtenerClaseEstado(chat)"></span>
      </div>

      <div class="chat-info">
        <div class="chat-header">
          <strong class="chat-name truncate">{{ chat.nombre }}</strong>
          <span class="chat-time">{{ chat.fecha | date:'shortTime' }}</span>
        </div>
        
        <div class="chat-preview">
          <p class="mensaje-texto truncate">{{ chat.mensaje }}</p>
          
          <div class="chat-actions">
            <button class="btn-saludos" (click)="$event.stopPropagation(); cambiarStatusSaludos.emit(chat)" title="Marcar como saludo">
              <i class="fas fa-hand-sparkles"></i>
            </button>
            
            <span class="badge badge-primary rounded-pill" *ngIf="chat.cantidadPendientes > 0">
              {{ chat.cantidadPendientes }}
            </span>
          </div>
        </div>
      </div>
      
    </div>

    <div *ngIf="chats.length === 0" class="empty-state-chat">
      <i class="fas fa-inbox empty-icon"></i>
      <p>No hay mensajes recientes.</p>
    </div>

    <div class="empty-state-chat" *ngIf="chatsFiltrados.length === 0 && chats.length > 0">
      <i class="fas fa-filter empty-icon"></i>
      <p>No hay chats en este estado.</p>
    </div>

  </div>
</div>
