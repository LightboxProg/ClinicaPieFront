<div class="crm-chat-layout">
    <!-- Barra lateral: lista de contactos -->
    <div class="sidebar-chats" *ngIf="!isMobile || showList">
        <div class="tabs">
            <button (click)="pestanaActiva = 'preguntones'" [class.activo]="pestanaActiva === 'preguntones'">
                Leads ({{ chatsPreguntones.length }})
            </button>
            <button (click)="pestanaActiva = 'pacientes'" [class.activo]="pestanaActiva === 'pacientes'">
                Pacientes ({{ chatsPacientes.length }})
            </button>
        </div>

        <app-chat-pregunton *ngIf="pestanaActiva === 'preguntones'" [chats]="chatsPreguntones"
            (seleccionar)="abrirChat($event)" (cambiarStatusSaludos)="cambiarStatusSaludos($event)">
        </app-chat-pregunton>

        <app-chat-paciente *ngIf="pestanaActiva === 'pacientes'" [chats]="chatsPacientes"
            (seleccionar)="abrirChat($event)" (cambiarStatusSaludos)="cambiarStatusSaludos($event)">
        </app-chat-paciente>
    </div>

    <!-- Área de conversación -->
    <div class="area-conversacion" *ngIf="!isMobile || !showList">
        <div *ngIf="!usuarioActivo" class="estado-vacio">
            <h3>Selecciona un chat para comenzar a enviar mensajes</h3>
        </div>

        <ng-container *ngIf="usuarioActivo">
            <div class="chat-header">
                <!-- Botón de volver (solo en móvil cuando se muestra la conversación) -->
                <button class="back-button" *ngIf="isMobile && !showList" (click)="volverALista()">
                    ←
                </button>
                <div class="user-info">
                    <h3>{{ usuarioActivo.nombre }}</h3>
                    <small>{{ usuarioActivo.telefono }}</small>
                </div>
            </div>

            <app-contenedor-chat #chatBurbujas [usuario]="usuarioActivo">
            </app-contenedor-chat>
            <app-mandar-mensaje [usuario]="usuarioActivo" (mensajeEnviado)="recargarHistorialYLista()">
            </app-mandar-mensaje>
        </ng-container>
    </div>
</div>
