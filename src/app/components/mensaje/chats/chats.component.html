<div class="chat-wrapper fade-in-up shadow-sm">
    
    <div class="chat-sidebar" *ngIf="!isMobile || showList">
        
        <div class="sidebar-tabs">
            <button class="tab-btn" (click)="pestanaActiva = 'preguntones'" [class.active]="pestanaActiva === 'preguntones'">
                Leads <span class="badge-count">{{ chatsPreguntones.length }}</span>
            </button>
            <button class="tab-btn" (click)="pestanaActiva = 'pacientes'" [class.active]="pestanaActiva === 'pacientes'">
                Pacientes <span class="badge-count">{{ chatsPacientes.length }}</span>
            </button>
        </div>

        <div class="sidebar-content">
            <app-chat-pregunton *ngIf="pestanaActiva === 'preguntones'" [chats]="chatsPreguntones"
                (seleccionar)="abrirChat($event)" (cambiarStatusSaludos)="cambiarStatusSaludos($event)">
            </app-chat-pregunton>

            <app-chat-paciente *ngIf="pestanaActiva === 'pacientes'" [chats]="chatsPacientes"
                (seleccionar)="abrirChat($event)" (cambiarStatusSaludos)="cambiarStatusSaludos($event)">
            </app-chat-paciente>
        </div>
    </div>

    <div class="chat-main-area" *ngIf="!isMobile || !showList">
        
        <div *ngIf="!usuarioActivo" class="empty-state-main">
            <div class="empty-circle">
                <i class="fas fa-comments"></i>
            </div>
            <h3>Selecciona un chat</h3>
            <p>Elige un contacto de la lista lateral para comenzar a enviar mensajes.</p>
        </div>

        <ng-container *ngIf="usuarioActivo">
            
            <div class="conversation-header">
                <button class="btn-icon back-btn" *ngIf="isMobile && !showList" (click)="volverALista()" title="Volver a la lista">
                    <i class="fas fa-arrow-left"></i>
                </button>
                
                <div class="profile-avatar">
                    <i class="fas fa-user"></i>
                </div>
                
                <div class="profile-info">
                    <h3 class="profile-name">{{ usuarioActivo.nombre }}</h3>
                    <span class="profile-phone"><i class="fas fa-phone-alt"></i> {{ usuarioActivo.telefono }}</span>
                </div>
            </div>

            <div class="messages-container">
                <app-contenedor-chat #chatBurbujas [usuario]="usuarioActivo">
                </app-contenedor-chat>
            </div>
