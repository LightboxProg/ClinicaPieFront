<div *ngIf="!plantilla" class="estado-vacio">
    <div class="icono-vacio">📱</div>
    <p>Selecciona una plantilla para ver la vista previa aquí.</p>
</div>

<div *ngIf="plantilla" class="whatsapp-simulador">
    <div class="whatsapp-chat-fondo">
        <div class="whatsapp-burbuja">
            
            <!-- HEADER -->
            <ng-container *ngIf="getComponente('HEADER') as header">
                <div class="wa-header-texto" *ngIf="header.format === 'TEXT'">
                    <strong>{{ header.text }}</strong>
                </div>
                <div class="wa-header-imagen" *ngIf="header.format === 'IMAGE'">
                    <div class="placeholder-img">
                        <span>📷 Imagen adjunta</span>
                    </div>
                </div>
            </ng-container>

            <!-- BODY -->
            <div class="wa-body">
                {{ getBodyConVariables() }}
            </div>

            <!-- FOOTER -->
            <ng-container *ngIf="getComponente('FOOTER') as footer">
                <div class="wa-footer">
                    {{ footer.text }}
                </div>
            </ng-container>

            <div class="wa-hora">12:00 PM <span class="wa-palomitas">✓✓</span></div>

        </div>

        <!-- BUTTONS -->
        <ng-container *ngIf="getComponente('BUTTONS') as botones">
            <div class="wa-botones-contenedor">
                <div class="wa-boton" *ngFor="let btn of botones.buttons">
                    <span *ngIf="btn.type === 'URL'">🔗</span>
                    <span *ngIf="btn.type === 'QUICK_REPLY'">↩️</span>
                    {{ btn.text }}
                </div>
            </div>
        </ng-container>

    </div>
</div>
