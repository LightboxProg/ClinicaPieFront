<form (ngSubmit)="guardarForm($event)" class="form-container">
    <div class="form-row">
        <div class="form-column">
            <div class="form-group">
                <label>Nombre del Servicio:</label>
                <input type="text" [(ngModel)]="formData.nombre" name="nombre" required placeholder="Ej: Depilación Láser - Bigote" class="form-control" />
            </div>

            <div class="form-group">
                <label>Categoría:</label>
                <select [(ngModel)]="formData.categoria" name="categoria" required class="form-control" aria-label="Categoría">
                    <option value="">Selecciona una categoría</option>
                    <option *ngFor="let categoria of categorias" [value]="categoria._id">{{ categoria.nombre }}</option>
                </select>
            </div>

            <div class="form-group">
                <label>Duración (minutos):</label>
                <input type="number" [(ngModel)]="formData.duracion" name="duracion" required min="1" class="form-control" placeholder="Ej. 60" />
            </div>

            <div class="form-row-half">
                <div class="form-group">
                    <label>Costo Individual:</label>
                    <input type="number" [(ngModel)]="formData.costo" name="costo" min="0" step="0.01" class="form-control" placeholder="$0.00" />
                </div>
                <div class="form-group">
                    <label>Costo de Paquete:</label>
                    <input type="number" [(ngModel)]="formData.costoPaquete" name="costoPaquete" min="0" step="0.01" class="form-control" placeholder="$0.00" />
                </div>
            </div>
        </div>

        <div class="form-column">
            <div class="form-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" [(ngModel)]="formData.tieneSesiones" name="tieneSesiones" />
                    <span>¿Incluye sesiones múltiples?</span>
                </label>
            </div>

            <div *ngIf="formData.tieneSesiones" class="sesiones-info panel-info">
                <div class="form-group">
                    <label>Número de Sesiones:</label>
                    <input type="number" [(ngModel)]="formData.sesiones.numero" name="sesionesNumero" min="1" class="form-control" placeholder="Ej. 5" />
                </div>
                <div class="form-group">
                    <label>Descripción de Sesiones:</label>
                    <textarea [(ngModel)]="formData.sesiones.descripcion" name="sesionesDescripcion" rows="2" class="form-control" placeholder="Ej: Paquete de 10 sesiones"></textarea>
                </div>
            </div>

            <div class="form-group">
                <label>Descripción Corta:</label>
                <textarea [(ngModel)]="formData.descripcionCorta" name="descripcionCorta" rows="3" class="form-control" placeholder="Una descripción breve del servicio."></textarea>
            </div>

            <div class="form-group">
                <label>Beneficios:</label>
                <div class="input-with-btn">
                    <input type="text" [(ngModel)]="nuevoBeneficio" name="nuevoBeneficio" class="form-control" placeholder="Agregar beneficio..." />
                    <button type="button" (click)="agregarBeneficio()" class="btn-icon" title="Agregar beneficio"><i class="fas fa-plus"></i></button>
                </div>
                <div class="list-container">
                    <div *ngFor="let b of formData.beneficios; let i = index" class="list-item">
                        <span>{{ b }}</span>
                        <button type="button" (click)="eliminarBeneficio(i)" class="btn-remove" title="Eliminar beneficio"><i class="fas fa-times"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="form-group faqs-section">
        <label>Preguntas Frecuentes:</label>
        <div class="faq-input-group">
            <input type="text" [(ngModel)]="nuevaFaq.pregunta" name="nuevaFaqPregunta" placeholder="Pregunta" class="form-control" />
            <input type="text" [(ngModel)]="nuevaFaq.respuesta" name="nuevaFaqRespuesta" placeholder="Respuesta" class="form-control" />
            <button type="button" (click)="agregarFaq()" class="btn-icon-primary" title="Agregar FAQ"><i class="fas fa-plus"></i></button>
        </div>
        <div class="list-container faqs-list">
            <div *ngFor="let faq of formData.faqs; let i = index" class="list-item faq-item">
                <div class="faq-content"><strong>{{ faq.pregunta }}</strong><p>{{ faq.respuesta }}</p></div>
                <button type="button" (click)="eliminarFaq(i)" class="btn-remove" title="Eliminar FAQ"><i class="fas fa-times"></i></button>
            </div>
        </div>
    </div>

    <div class="form-footer">
        <label class="checkbox-label active-toggle">
            <input type="checkbox" [(ngModel)]="formData.activo" name="activo" />
            <span>Servicio Activo</span>
        </label>
        
        <div class="actions">
            <button type="button" (click)="cancelarForm()" class="btn-secondary">Cancelar</button>
            <button type="submit" class="btn-primary">{{ esEdicion ? 'Actualizar' : 'Crear' }} Servicio</button>
        </div>
    </div>
</form>
