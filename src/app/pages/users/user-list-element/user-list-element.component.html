<div class="users-container">
  <!-- Filtros -->
  <div class="filters-card">
    <h3 class="filters-title">
      <span class="filter-icon" aria-hidden="true"></span>
      Filtros de Búsqueda
    </h3>

    <div class="filters-grid">
      <!-- Buscador -->
      <div class="filter-group">
        <label class="filter-label">Buscar Usuario</label>
        <div class="input-icon">
          <span class="input-icon-svg search-icon" aria-hidden="true"></span>
          <input type="text" placeholder="Nombre, usuario o teléfono..." [(ngModel)]="searchTerm" (ngModelChange)="onSearchChange()" class="filter-input">
        </div>
      </div>

      <!-- Selector de rol -->
      <div class="filter-group">
        <label class="filter-label">Filtrar por Rol</label>
        <div class="input-icon">
          <span class="input-icon-svg user-icon" aria-hidden="true"></span>
          <select [(ngModel)]="selectedRole" (change)="onRoleChange()" class="filter-select" [attr.aria-label]="'Filtrar usuarios por rol'">
            <option value="">Todos los roles</option>
            <option *ngFor="let role of roles" [value]="role">{{ role }}</option>
          </select>
          <span class="select-arrow" aria-hidden="true"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Lista de usuarios -->
  <div *ngFor="let usuario of filteredUsuarios" class="user-card">
    <div class="user-info-area" (click)="verDetalles(usuario)">
      <div class="user-avatar">
        <img src="https://static.vecteezy.com/system/resources/previews/019/879/186/non_2x/user-icon-on-transparent-background-free-png.png" alt="Avatar">
      </div>
      <div class="user-details">
        <div class="detail-row">
          <span class="detail-label">Nombre:</span>
          <span class="detail-value">{{usuario.nombre}} {{usuario.apeP}} {{usuario.apeM}}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Usuario:</span>
          <span class="detail-value username">{{usuario.usuario}}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Tipo:</span>
          <span class="detail-value type">{{usuario.tipo}}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Especialidad:</span>
          <span class="detail-value specialty">{{usuario.especialidad}}</span>
        </div>
      </div>
    </div>
    <div class="user-actions">
      <button class="btn-edit" (click)="editarUsuario(usuario)">Editar</button>
      <button class="btn-danger" (click)="eliminarUsuario(usuario)">Eliminar</button>
    </div>
  </div>

  <app-user-modal [usuario]="selectedUser" (usuarioActualizado)="recargar()"></app-user-modal>
</div>
