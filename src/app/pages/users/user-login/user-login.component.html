<div class="login-page fade-in-up">
  <div class="login-card">
    
    <div class="login-header">
      <img src="assets/logos/logo-clinica-pie.png" alt="Clínica del Pie Tijuana" class="login-logo">
      <h1 class="login-title">Bienvenido</h1>
      <p class="login-subtitle">Ingresa tus credenciales para acceder al sistema</p>
    </div>
    
    <form class="login-form" (ngSubmit)="onSubmit($event)">
      
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <div class="input-icon-wrapper">
          <i class="fas fa-user icon"></i>
          <input type="text" id="usuario" [(ngModel)]="usuario" name="usuario"
            class="form-control-icon" placeholder="Ingrese su usuario" required />
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-icon-wrapper">
          <i class="fas fa-lock icon"></i>
          <input type="password" id="password" [(ngModel)]="password" name="password"
            class="form-control-icon" placeholder="Ingrese su contraseña" required />
        </div>
      </div>
      
      <button type="submit" class="btn-primary w-full mt-2">
        Iniciar Sesión
      </button>

    </form>
  </div>
</div>
