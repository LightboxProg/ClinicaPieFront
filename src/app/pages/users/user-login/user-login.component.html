<div class="register-page">

    
    <div class="register-form-container">
        <div class="form-header">
            <span class="logo">Propigment</span>
            <h1 class="title">Iniciar Sesión</h1>
        </div>
        
        <form class="register-form" (ngSubmit)="onSubmit($event)">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <div class="input-container">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="usuario" [(ngModel)]="usuario" name="usuario"
                        placeholder="Ingrese su usuario" required />
                </div>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="input-container">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" [(ngModel)]="password" name="password"
                        placeholder="Ingrese su contraseña" required />
                </div>
            </div>
            
            <button type="submit" class="btn-register">Iniciar Sesión</button>
        </form>
    </div>
</div>
